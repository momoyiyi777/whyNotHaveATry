<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄时钟 - Pomodoro Timer</title>
<style>
  :root {
    --work: #e74c3c;
    --break: #2ecc71;
    --long-break: #3498db;
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #eee;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    text-align: center;
    padding: 40px 30px;
    max-width: 420px;
    width: 100%;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 30px;
  }

  /* ── 模式切换 ── */
  .mode-tabs {
    display: flex;
    background: var(--card);
    border-radius: 30px;
    padding: 4px;
    margin-bottom: 30px;
  }

  .mode-tab {
    flex: 1;
    padding: 10px 6px;
    border: none;
    border-radius: 26px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s;
    font-family: inherit;
  }

  .mode-tab.active {
    background: var(--work);
    color: #fff;
  }
  .mode-tab.mode-break.active {
    background: var(--break);
  }
  .mode-tab.mode-long.active {
    background: var(--long-break);
  }

  /* ── 环形进度 ── */
  .ring-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 30px;
  }

  .ring {
    transform: rotate(-90deg);
    width: 280px;
    height: 280px;
  }

  .ring-bg {
    fill: none;
    stroke: #2a2a4a;
    stroke-width: 8;
  }

  .ring-fill {
    fill: none;
    stroke: var(--work);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }
  .ring-fill.break { stroke: var(--break); }
  .ring-fill.long-break { stroke: var(--long-break); }

  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 4rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1;
  }

  .status-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ── 按钮 ── */
  .controls {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 30px;
  }

  .btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid #555;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn:hover { border-color: #fff; }
  .btn:active { transform: scale(0.93); }

  .btn-start {
    width: 64px;
    height: 64px;
    background: var(--work);
    border-color: var(--work);
    font-size: 1.5rem;
  }
  .btn-start:hover { opacity: 0.85; }

  .btn-start.paused {
    background: var(--break);
    border-color: var(--break);
  }

  /* ── 统计 ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 36px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .stat-num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    display: block;
  }

  /* ── 通知弹窗 ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--card);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px 28px;
    font-size: 1.05rem;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
  .toast.work-toast { border-color: var(--work); }
  .toast.break-toast { border-color: var(--break); }
</style>
</head>
<body>

<div class="container">
  <h1>POMODORO</h1>
  <p class="subtitle">番茄工作法计时器</p>

  <div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="work">专注 25分钟</button>
    <button class="mode-tab mode-break" data-mode="break">短休 5分钟</button>
    <button class="mode-tab mode-long" data-mode="longBreak">长休 15分钟</button>
  </div>

  <div class="ring-wrapper">
    <svg class="ring" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-fill" id="ringFill" cx="140" cy="140" r="130"
              stroke-dasharray="816.8" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <span class="time" id="timer">25:00</span>
      <span class="status-label" id="statusLabel">准备开始</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btnReset" title="重置">↺</button>
    <button class="btn btn-start" id="btnStart" title="开始">▶</button>
    <button class="btn" id="btnSkip" title="跳过">⏭</button>
  </div>

  <div class="stats">
    <div>已完成<span class="stat-num" id="sessionsCount">0</span>个番茄</div>
    <div>今日专注<span class="stat-num" id="todayMinutes">0</span>分钟</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 130; // ~816.8

const MODES = {
  work:       { label: '专注', next: 'break',     color: '#e74c3c', minutes: 25, ringClass: '' },
  break:      { label: '短休', next: 'work',       color: '#2ecc71', minutes:  5, ringClass: 'break' },
  longBreak:  { label: '长休', next: 'work',       color: '#3498db', minutes: 15, ringClass: 'long-break' },
};

let currentMode = 'work';
let timeLeft = MODES.work.minutes * 60;
let totalSeconds = timeLeft;
let timerId = null;
let running = false;
let sessions = parseInt(localStorage.getItem('pomo_sessions') || '0');
let todayStr = new Date().toDateString();
let todayMinutes = parseInt(localStorage.getItem('pomo_today_' + todayStr) || '0');

updateDisplay();
updateStats();

// ── 模式切换 ──
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

function switchMode(mode) {
  if (running && !confirm('切换模式将重置当前计时，确定吗？')) return;
  reset(false);
  currentMode = mode;
  timeLeft = MODES[mode].minutes * 60;
  totalSeconds = timeLeft;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  updateDisplay();
}

// ── 开始/暂停 ──
document.getElementById('btnStart').addEventListener('click', () => {
  if (running) { pause(); } else { start(); }
});

function start() {
  if (timeLeft <= 0) {
    timeLeft = MODES[currentMode].minutes * 60;
    totalSeconds = timeLeft;
    updateDisplay();
  }
  running = true;
  totalSeconds = timeLeft;
  const btn = document.getElementById('btnStart');
  btn.textContent = '❚❚';
  btn.classList.add('paused');
  document.getElementById('statusLabel').textContent = MODES[currentMode].label + '中...';

  timerId = setInterval(tick, 1000);
}

function pause() {
  running = false;
  clearInterval(timerId);
  timerId = null;
  const btn = document.getElementById('btnStart');
  btn.textContent = '▶';
  btn.classList.remove('paused');
  document.getElementById('statusLabel').textContent = '已暂停';
}

function reset(clearTimer = true) {
  pause();
  if (clearTimer) {
    timeLeft = MODES[currentMode].minutes * 60;
    totalSeconds = timeLeft;
  }
  const btn = document.getElementById('btnStart');
  btn.textContent = '▶';
  btn.classList.remove('paused');
  document.getElementById('statusLabel').textContent = '准备开始';
  updateDisplay();
}

document.getElementById('btnReset').addEventListener('click', () => reset());
document.getElementById('btnSkip').addEventListener('click', () => {
  if (running && !confirm('确定跳过当前阶段？')) return;
  complete();
});

// ── 每秒滴答 ──
function tick() {
  timeLeft--;
  if (timeLeft <= 0) {
    complete();
  }
  updateDisplay();
}

function complete() {
  pause();
  const completedMode = currentMode;

  if (completedMode === 'work') {
    sessions++;
    todayMinutes += MODES.work.minutes;
    localStorage.setItem('pomo_sessions', sessions);
    localStorage.setItem('pomo_today_' + todayStr, todayMinutes);
    updateStats();
    notify('🎯 番茄完成！休息一下吧', 'work-toast');
  } else {
    notify('☕ 休息结束！开始新的番茄吧', 'break-toast');
  }

  // 自动切换
  currentMode = MODES[completedMode].next;
  timeLeft = MODES[currentMode].minutes * 60;
  totalSeconds = timeLeft;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${currentMode}"]`).classList.add('active');
  updateDisplay();

  // 自动开始
  start();
}

// ── 显示更新 ──
function updateDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timer').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

  const fill = document.getElementById('ringFill');
  const offset = CIRCUMFERENCE * (1 - timeLeft / totalSeconds);
  fill.style.strokeDashoffset = offset;
  fill.classList.remove('break', 'long-break');
  if (MODES[currentMode].ringClass) {
    fill.classList.add(MODES[currentMode].ringClass);
  }

  document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} - ${MODES[currentMode].label}`;
}

function updateStats() {
  document.getElementById('sessionsCount').textContent = sessions;
  document.getElementById('todayMinutes').textContent = todayMinutes;
}

// ── 通知 ──
function notify(msg, className) {
  // 浏览器通知
  if (Notification.permission === 'granted') {
    new Notification('番茄时钟', { body: msg.replace(/[🎯☕]/g,'').trim() });
  } else if (Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // 弹窗
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (className || '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);

  // 声音提示
  playBeep();
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [800, 1000, 1200].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.2);
    });
  } catch(e) { /* 静默处理 */ }
}

// ── 键盘快捷键 ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    running ? pause() : start();
  } else if (e.code === 'KeyR') {
    reset();
  } else if (e.code === 'KeyS') {
    document.getElementById('btnSkip').click();
  } else if (e.code === 'Digit1') {
    switchMode('work');
  } else if (e.code === 'Digit2') {
    switchMode('break');
  } else if (e.code === 'Digit3') {
    switchMode('longBreak');
  }
});
</script>
</body>
</html>
